<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEMONADE — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #080612;
      --bg1: #100c1c;
      --text: rgba(248, 250, 252, 0.96);
      --muted: rgba(230, 224, 255, 0.52);
      --faint: rgba(200, 190, 230, 0.32);
      --border: rgba(180, 160, 220, 0.14);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      overflow: hidden;
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 15px;
      color: var(--text);
      background:
        radial-gradient(ellipse 78% 48% at 50% -8%, rgba(167, 139, 250, 0.1), transparent 55%),
        radial-gradient(ellipse 58% 42% at 96% 48%, rgba(251, 113, 133, 0.07), transparent 50%),
        radial-gradient(ellipse 52% 38% at 4% 78%, rgba(251, 191, 36, 0.055), transparent 46%),
        linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 48%, #06040e 100%);
      -webkit-font-smoothing: antialiased;
    }

    .nn-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 1;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 1;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }
    .glow.a {
      width: 520px;
      height: 520px;
      top: -180px;
      right: -120px;
      background: rgba(167, 139, 250, 0.14);
    }
    .glow.b {
      width: 420px;
      height: 420px;
      bottom: -140px;
      left: -100px;
      background: rgba(251, 113, 133, 0.1);
    }

    .shell {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(20px, 4vw, 40px) clamp(22px, 5vw, 48px) 28px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeUp 0.85s ease forwards;
      animation-delay: 0.1s;
    }

    .brand {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(210, 200, 235, 0.5);
    }

    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px 12px 48px;
      max-width: 920px;
      margin: 0 auto;
      width: 100%;
    }

    .wordmark {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      font-weight: 700;
      font-size: clamp(3.2rem, 12vw, 6.5rem);
      line-height: 0.92;
      letter-spacing: -0.04em;
      background: linear-gradient(120deg, rgba(248, 250, 252, 0.96) 0%, rgba(248, 250, 252, 0.88) 40%, rgba(200, 220, 255, 0.95) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      opacity: 0;
      transform: translateY(22px);
      animation: heroIn 1.05s cubic-bezier(0.2, 0.75, 0.2, 1) forwards;
      animation-delay: 0.2s;
    }

    .wordmark span {
      background: linear-gradient(120deg, #c9f85e 0%, #7aefff 55%, #ccbaff 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .meta {
      margin: clamp(18px, 3vw, 28px) 0 0;
      font-size: clamp(0.82rem, 1.5vw, 0.95rem);
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.45s;
    }

    .meta .dot {
      opacity: 0.45;
      padding: 0 0.35em;
    }

    .tagline {
      margin: clamp(20px, 4vw, 36px) 0 0;
      max-width: 38ch;
      font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
      font-size: clamp(1.28rem, 3vw, 1.95rem);
      font-weight: 500;
      font-optical-sizing: auto;
      font-feature-settings: "kern" 1, "liga" 1;
      line-height: 1.42;
      letter-spacing: -0.015em;
      color: rgba(245, 240, 255, 0.9);
      opacity: 0;
      animation: fadeUp 0.95s ease forwards;
      animation-delay: 0.58s;
    }

    .cta-wrap {
      margin-top: clamp(36px, 6vw, 52px);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.85s;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 36px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: #05080c;
      background: linear-gradient(120deg, #c9f85e 0%, #a8f0d0 45%, #7aefff 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.12),
        0 18px 48px rgba(0, 0, 0, 0.35),
        0 0 40px rgba(122, 239, 255, 0.15);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.18),
        0 22px 56px rgba(0, 0, 0, 0.4),
        0 0 50px rgba(201, 248, 94, 0.18);
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta svg {
      width: 18px;
      height: 18px;
      opacity: 0.85;
    }

    .hint {
      margin-top: clamp(28px, 5vw, 44px);
      font-size: 0.78rem;
      color: var(--faint);
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 1.1s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes heroIn {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 640px) {
      .top {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <canvas class="nn-bg" id="nnBg" aria-hidden="true"></canvas>
  <div class="noise" aria-hidden="true"></div>
  <div class="glow a" aria-hidden="true"></div>
  <div class="glow b" aria-hidden="true"></div>

  <div class="shell">
    <header class="top">
      <div class="brand">LEMONADE</div>
      <div class="badge">Interactive deck</div>
    </header>

    <main class="hero">
      <h1 class="wordmark">LEMO<span>NADE</span></h1>
      <p class="meta">Research demo <span class="dot">·</span></p>
      <p class="tagline">
        One framework. Multiple objectives. Smarter neural architectures.
      </p>
      <div class="cta-wrap">
        <a class="cta" href="slide1.html">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 5v14l11-7z" />
          </svg>
          Play demo
        </a>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var canvas = document.getElementById("nnBg");
      if (!canvas || !canvas.getContext) return;
      var ctx = canvas.getContext("2d");
      var reduced =
        typeof window.matchMedia === "function" &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      var layers = [];
      var nodes = [];
      var edges = [];
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var t0 = performance.now();

      var EDGE_WIDTH = 1.35;
      var EDGE_ALPHA_BASE = 0.042;
      var EDGE_ALPHA_WOBBLE = 0.05;

      function nodeDrawX(i, now) {
        var n = nodes[i];
        if (reduced) return n.x;
        return (
          n.x +
          Math.sin(now * 0.00055 + n.c * 0.45 + i * 0.31) * 4.2
        );
      }

      function nodeDrawY(i, now) {
        var n = nodes[i];
        if (reduced) return n.y;
        return (
          n.y +
          Math.cos(now * 0.00062 + n.c * 0.38 + i * 0.27) * 3.2
        );
      }

      function hueForColumn(c) {
        if (c <= 1) return { h: 226, s: 72, l: 62 };
        if (c >= layers.length - 2) return { h: 38, s: 92, l: 58 };
        return { h: 292, s: 58, l: 68 };
      }

      function randomEdgeColor() {
        var pick = Math.floor(Math.random() * 5);
        if (pick === 0) {
          return {
            h: 0,
            s: Math.floor(Math.random() * 12),
            l: Math.floor(74 + Math.random() * 18),
          };
        }
        if (pick === 1) {
          return {
            h: Math.floor(118 + Math.random() * 22),
            s: Math.floor(50 + Math.random() * 30),
            l: Math.floor(44 + Math.random() * 18),
          };
        }
        if (pick === 2) {
          return {
            h: Math.floor(206 + Math.random() * 22),
            s: Math.floor(58 + Math.random() * 32),
            l: Math.floor(50 + Math.random() * 16),
          };
        }
        if (pick === 3) {
          return {
            h: Math.floor(48 + Math.random() * 16),
            s: Math.floor(78 + Math.random() * 22),
            l: Math.floor(52 + Math.random() * 14),
          };
        }
        return {
          h: Math.floor(Math.random() * 16),
          s: Math.floor(82 + Math.random() * 18),
          l: Math.floor(50 + Math.random() * 16),
        };
      }

      function buildGraph(w, h) {
        nodes = [];
        edges = [];

        var cols = Math.max(8, Math.min(12, Math.floor(w / 95)));
        var rows = Math.max(6, Math.min(14, Math.floor(h / 55)));
        layers = [];
        for (var li = 0; li < cols; li++) {
          layers.push(rows);
        }

        var padX = Math.max(6, w * 0.012);
        var padY = Math.max(6, h * 0.012);
        var innerW = w - padX * 2;
        var innerH = h - padY * 2;
        var colCount = layers.length;
        for (var c = 0; c < colCount; c++) {
          var n = layers[c];
          var x = padX + (innerW * c) / Math.max(1, colCount - 1);
          for (var r = 0; r < n; r++) {
            var ty = n === 1 ? 0.5 : r / (n - 1);
            var y = padY + innerH * ty;
            nodes.push({ x: x, y: y, c: c, r: r });
          }
        }

        for (var i = 0; i < nodes.length; i++) {
          var a = nodes[i];
          if (a.c >= layers.length - 1) continue;
          for (var j = 0; j < nodes.length; j++) {
            var b = nodes[j];
            if (b.c !== a.c + 1) continue;
            var col = randomEdgeColor();
            edges.push({
              from: i,
              to: j,
              phase: Math.random() * Math.PI * 2,
              eh: col.h,
              es: col.s,
              el: col.l,
            });
          }
        }
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        var w = window.innerWidth;
        var h = window.innerHeight;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        buildGraph(w, h);
      }

      function drawFrame(now) {
        var w = canvas.clientWidth;
        var h = canvas.clientHeight;
        if (!w || !h) {
          if (!reduced) requestAnimationFrame(drawFrame);
          return;
        }
        ctx.clearRect(0, 0, w, h);

        var phase = reduced ? 0 : (now - t0) * 0.0012;

        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = EDGE_WIDTH;

        for (var ei = 0; ei < edges.length; ei++) {
          var e = edges[ei];
          var a = nodes[e.from];
          var b = nodes[e.to];
          var wobble = reduced
            ? 0
            : EDGE_ALPHA_WOBBLE *
              Math.sin(phase * 2.4 + e.phase + ei * 0.03);
          var alpha = EDGE_ALPHA_BASE + wobble;
          ctx.beginPath();
          ctx.moveTo(nodeDrawX(e.from, now), nodeDrawY(e.from, now));
          ctx.lineTo(nodeDrawX(e.to, now), nodeDrawY(e.to, now));
          ctx.strokeStyle =
            "hsla(" + e.eh + "," + e.es + "%," + e.el + "%," + alpha + ")";
          ctx.stroke();
        }

        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          var hue = hueForColumn(n.c);
          var pulse = reduced ? 1 : 0.88 + 0.14 * Math.sin(phase * 1.8 + i * 0.2);
          var rad = 6 + (n.c === 0 || n.c === layers.length - 1 ? 1.0 : 0);
          ctx.beginPath();
          ctx.arc(nodeDrawX(i, now), nodeDrawY(i, now), rad * pulse, 0, Math.PI * 2);
          ctx.fillStyle =
            "hsla(" + hue.h + "," + hue.s + "%," + hue.l + "%," + (0.12 + n.c * 0.012) + ")";
          ctx.fill();
          ctx.strokeStyle = "hsla(" + hue.h + "," + hue.s + "%," + (hue.l + 12) + "%,0.2)";
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }

        if (!reduced) requestAnimationFrame(drawFrame);
      }

      window.addEventListener("resize", function () {
        resize();
        if (reduced) drawFrame(performance.now());
      });
      resize();
      if (reduced) {
        drawFrame(performance.now());
      } else {
        requestAnimationFrame(drawFrame);
      }
    })();
  </script>
</body>
</html>
